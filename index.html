<!DOCTYPE html>
<html>
<head>
<title>Feedback Form</title>
<link rel="stylesheet" href="./css/style.css">
</head>

<body>

<form>
<h2>Customer Feedback Form</h2>

<label>Name:</label>
<input type="text"
onkeypress="validateInput(event)"
onmouseover="highlightField(this)"
onmouseout="removeHighlight(this)">

<label>Feedback:</label>
<textarea
onmouseover="highlightField(this)"
onmouseout="removeHighlight(this)"></textarea>

<button type="button" ondblclick="submitForm()">
Submit (Double Click)
</button>
</form>

<script src="./js/script.js"></script>
</body>
</html>
